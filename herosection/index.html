<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Section</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=1600') no-repeat center center/cover;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
}

.hero-content{
    position:relative;
    z-index:1;
    height:100%;
    display:flex;
    align-items:center;
}

.hero h1{
    color:#fff;
    font-size:60px;
    font-weight:700;
}

.hero p{
    color:#0a0909;
    font-size:18px;
    margin:20px 0;
}

.btn1{
    background:#bb2d76;
    color:rgb(244, 240, 240);
    padding:12px 30px;
    border-radius:30px;
    text-decoration:none;
    margin-right:15px;
}

.btn1:hover{
    background:#070606;
}

.btn2{
    border:2px solid white;
    color:white;
    padding:12px 30px;
    border-radius:30px;
    text-decoration:none;
}

.btn2:hover{
    background:white;
    color:black;
}
</style>

</head>
<body>

<section class="hero">
<div class="container hero-content">
<div class="row">
<div class="col-lg-7">

<h1>Explore The <br> Beautiful Universe</h1>

<p>
Travel through galaxies, discover amazing planets,
and experience the beauty of the cosmos like never before.
</p>

<a href="#" class="btn1">Get Started</a>
<a href="#" class="btn2">Learn More</a>

</div>
</div>
</div>
</section>

</body>
</html>
